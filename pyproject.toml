[project]
name = "oas2mcp"
version = "0.1.0"
description = "Default template for PDM package"
authors = [{ name = "Will", email = "you@example.com" }]
dependencies = [
  "pydantic<3,>=2.12",
  "rich<16,>=15",
  "langchain-community>=0.4.1",
  "langchain>=1.2.15",
  "langchain-core>=1.2.30",
  "langgraph>=1.1.6",
  "langgraph-sdk>=0.3.13",
  "langchain-openai>=1.1.13",
  "python-dotenv>=1.2.2",
  "httpx>=0.28.1",
  "fastmcp>=3.2.4",
]
requires-python = ">=3.13"
readme = "README.md"
license = { text = "MIT" }

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"


[tool.pdm]
distribution = true

[dependency-groups]
test = ["pytest<10,>=9"]
lint = ["ruff>=0.11", "mypy>=1.15"]
cli = ["typer<0.25,>=0.24"]
config = ["pydantic-settings<3,>=2.13"]
docs = [
  "sphinx>=9.1.0",
  "furo>=2025.12.19",
  "sphinx-autobuild>=2025.8.25",
  "myst-parser>=5.0.0",
  "myst-nb>=1.4.0",
  "sphinx-copybutton>=0.5.2",
  "sphinx-design>=0.7.0",
  "sphinx-togglebutton>=0.4.5",
  "sphinx-inline-tabs>=2025.12.21.14",
  "sphinxcontrib-mermaid>=2.0.1",
  "sphinx-autodoc-typehints>=3.10.2",
  "autodoc-pydantic>=2.2.0",
  "sphinx-autoapi>=3.8.0",
  "sphinxext-opengraph>=0.13.0",
  "sphinx-sitemap>=2.9.0",
  "sphinx-notfound-page>=1.1.0",
  "sphinx-last-updated-by-git>=0.3.8",
  "sphinx-reredirects>=1.1.0",
  "sphinxcontrib-spelling>=8.0.2",
  "doc8>=2.0.0",
]
