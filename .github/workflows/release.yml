name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PDM
        run: |
          python -m pip install --upgrade pip
          python -m pip install pdm==2.26.7

      - name: Show tool versions
        run: |
          python --version
          pdm --version

      - name: Disable uv-backed installer in CI
        run: pdm config use_uv false

      - name: Install project dependencies
        run: |
          pdm install -G test -G docs

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import pathlib
          import re

          pyproject = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version = "([^"]+)"$', pyproject, flags=re.MULTILINE)
          if not match:
              raise SystemExit("Could not read package version from pyproject.toml")

          version = match.group(1)
          tag = "${{ github.ref_name }}"
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(
                  f"Git tag {tag!r} does not match package version {expected!r}"
              )
          print(f"Verified release tag {tag} matches package version {version}")
          PY

      - name: Run pytest
        run: pdm run pytest

      - name: Build documentation
        run: |
          rm -rf docs/source/autoapi docs/_build
          pdm run docs_build

      - name: Build distributions
        run: pdm build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Prefer an explicit API token when one is configured; otherwise
          # fall back to PyPI trusted publishing via GitHub OIDC.
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
