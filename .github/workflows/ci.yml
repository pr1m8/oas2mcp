name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PDM
        uses: pdm-project/setup-pdm@v4
        with:
          version: "2.26.7"
          python-version: "3.13"
          cache: true

      - name: Install test dependencies
        run: pdm install -G test

      - name: Run pytest
        run: pdm run pytest
